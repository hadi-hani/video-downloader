<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محمّل الفيديوهات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-body: 'IBM Plex Sans Arabic', 'Segoe UI', sans-serif;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem; --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem; --space-10: 2.5rem; --space-12: 3rem;
      --radius-sm: 0.375rem; --radius-md: 0.5rem;
      --radius-lg: 0.75rem; --radius-xl: 1rem; --radius-full: 9999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --bg: #0f0f10;
      --surface: #17171a;
      --surface-2: #1e1e22;
      --surface-3: #26262c;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --text: #e8e8ec;
      --text-muted: #8a8a96;
      --text-faint: #4a4a54;
      --accent: #7c6aff;
      --accent-hover: #9d8fff;
      --accent-bg: rgba(124,106,255,0.12);
      --accent-border: rgba(124,106,255,0.3);
      --success: #4ade80;
      --success-bg: rgba(74,222,128,0.1);
      --error: #f87171;
      --error-bg: rgba(248,113,113,0.1);
      --warning: #fbbf24;
      --warning-bg: rgba(251,191,36,0.1);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.6);
    }

    [data-theme="light"] {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-2: #f0f0f5;
      --surface-3: #e8e8ef;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --text: #1a1a2e;
      --text-muted: #6b6b80;
      --text-faint: #a0a0b0;
      --accent: #5b4de8;
      --accent-hover: #4a3dd0;
      --accent-bg: rgba(91,77,232,0.08);
      --accent-border: rgba(91,77,232,0.25);
      --success: #16a34a;
      --success-bg: rgba(22,163,74,0.08);
      --error: #dc2626;
      --error-bg: rgba(220,38,38,0.08);
      --warning: #d97706;
      --warning-bg: rgba(217,119,6,0.08);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
    }

    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: var(--text);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-8) var(--space-4);
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Header ─── */
    .header {
      width: 100%;
      max-width: 560px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-10);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }

    .logo-text {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text);
    }

    .theme-toggle {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--border-strong); }

    /* ─── Card ─── */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: var(--space-8);
      box-shadow: var(--shadow-md);
    }

    /* ─── Platform tabs ─── */
    .platforms {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
    }

    .platform-btn {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-family: var(--font-body);
      cursor: pointer;
      transition: all var(--transition);
      font-weight: 500;
    }
    .platform-btn:hover { color: var(--text); border-color: var(--border-strong); }
    .platform-btn.active {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
    }

    /* ─── Input group ─── */
    .input-group {
      position: relative;
      margin-bottom: var(--space-4);
    }

    .url-input {
      width: 100%;
      padding: var(--space-4) var(--space-5);
      padding-inline-end: 48px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      color: var(--text);
      font-size: var(--text-sm);
      font-family: var(--font-body);
      outline: none;
      transition: border-color var(--transition);
      direction: ltr;
      text-align: left;
    }
    .url-input::placeholder { color: var(--text-faint); }
    .url-input:focus { border-color: var(--accent-border); }

    .input-clear {
      position: absolute;
      inset-inline-end: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border-radius: var(--radius-md);
      background: none;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all var(--transition);
    }
    .input-clear.visible { opacity: 1; }
    .input-clear:hover { color: var(--text-muted); background: var(--surface-3); }

    /* ─── Download button ─── */
    .download-btn {
      width: 100%;
      padding: var(--space-4) var(--space-6);
      background: var(--accent);
      border: none;
      border-radius: var(--radius-lg);
      color: #fff;
      font-size: var(--text-base);
      font-family: var(--font-body);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
    }
    .download-btn:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .download-btn:active:not(:disabled) { transform: translateY(0); }
    .download-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .download-btn.loading .btn-spinner { display: block; }
    .download-btn.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Status messages ─── */
    .status-box {
      margin-top: var(--space-5);
      padding: var(--space-4) var(--space-5);
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      line-height: 1.6;
      display: none;
      align-items: flex-start;
      gap: var(--space-3);
      animation: fadeIn 0.2s ease;
    }
    .status-box.visible { display: flex; }
    .status-box.success { background: var(--success-bg); border: 1px solid rgba(74,222,128,0.2); color: var(--success); }
    .status-box.error   { background: var(--error-bg);   border: 1px solid rgba(248,113,113,0.2); color: var(--error); }
    .status-box.info    { background: var(--accent-bg);  border: 1px solid var(--accent-border); color: var(--accent); }
    .status-box.warning { background: var(--warning-bg); border: 1px solid rgba(251,191,36,0.2); color: var(--warning); }
    .status-icon { flex-shrink: 0; margin-top: 1px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

    /* ─── Download result ─── */
    .result-box {
      margin-top: var(--space-5);
      padding: var(--space-5);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: none;
      flex-direction: column;
      gap: var(--space-4);
      animation: fadeIn 0.25s ease;
    }
    .result-box.visible { display: flex; }

    .result-meta {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .result-thumb {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-md);
      object-fit: cover;
      background: var(--surface-3);
      flex-shrink: 0;
    }

    .result-info { flex: 1; overflow: hidden; }
    .result-title {
      font-weight: 600;
      font-size: var(--text-sm);
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: var(--space-1);
    }
    .result-platform { font-size: var(--text-xs); color: var(--text-muted); }

    .result-actions {
      display: flex;
      gap: var(--space-3);
    }

    .action-btn {
      flex: 1;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-size: var(--text-sm);
      font-family: var(--font-body);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      text-decoration: none;
      transition: all var(--transition);
      font-weight: 500;
    }
    .action-btn:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface-2); }
    .action-btn.primary {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
    }
    .action-btn.primary:hover { background: var(--accent); color: #fff; }

    /* ─── Instance status bar ─── */
    .instances-bar {
      width: 100%;
      max-width: 560px;
      margin-top: var(--space-6);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .instances-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-5);
      cursor: pointer;
      user-select: none;
      transition: background var(--transition);
    }
    .instances-header:hover { background: var(--surface-2); }

    .instances-title {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-muted);
    }

    .instances-count {
      font-size: var(--text-xs);
      padding: 2px var(--space-2);
      border-radius: var(--radius-full);
      background: var(--accent-bg);
      color: var(--accent);
      font-weight: 600;
    }

    .instances-chevron {
      color: var(--text-faint);
      transition: transform var(--transition);
    }
    .instances-bar.expanded .instances-chevron { transform: rotate(180deg); }

    .instances-list {
      display: none;
      flex-direction: column;
      border-top: 1px solid var(--border);
    }
    .instances-bar.expanded .instances-list { display: flex; }

    .instance-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-5);
      border-bottom: 1px solid var(--border);
      gap: var(--space-3);
      transition: background var(--transition);
    }
    .instance-row:last-child { border-bottom: none; }
    .instance-row:hover { background: var(--surface-2); }
    .instance-row.active-instance { background: var(--accent-bg); }

    .instance-url {
      font-size: var(--text-xs);
      color: var(--text-muted);
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      direction: ltr;
      text-align: left;
    }
    .instance-row.active-instance .instance-url { color: var(--accent); }

    .instance-status {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-xs);
      font-weight: 500;
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-checking { background: var(--text-faint); animation: pulse 1.5s ease infinite; }
    .dot-ok       { background: var(--success); }
    .dot-error    { background: var(--error); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .instance-ping {
      font-size: var(--text-xs);
      color: var(--text-faint);
      min-width: 40px;
      text-align: end;
    }

    /* ─── Footer ─── */
    .footer {
      margin-top: var(--space-10);
      font-size: var(--text-xs);
      color: var(--text-faint);
      text-align: center;
      line-height: 1.7;
    }
    .footer a { color: var(--text-faint); text-decoration: underline; }
    .footer a:hover { color: var(--text-muted); }

    @media (max-width: 480px) {
      body { padding: var(--space-6) var(--space-3); }
      .card { padding: var(--space-6); }
      .result-actions { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 15 3.5-3.5M12 15l-3.5-3.5M12 15V3"/>
          <path d="M8 21h8M4 17h16"/>
        </svg>
      </div>
      <span class="logo-text">محمّل الفيديوهات</span>
    </div>
    <button class="theme-toggle" data-theme-toggle aria-label="تبديل المظهر">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <!-- Main card -->
  <div class="card">
    <!-- Platform tabs -->
    <div class="platforms">
      <button class="platform-btn active" data-platform="auto">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        اكتشاف تلقائي
      </button>
      <button class="platform-btn" data-platform="youtube">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.19a3.02 3.02 0 0 0-2.12-2.14C19.55 3.5 12 3.5 12 3.5s-7.55 0-9.38.55A3.02 3.02 0 0 0 .5 6.19C0 8.04 0 12 0 12s0 3.96.5 5.81a3.02 3.02 0 0 0 2.12 2.14C4.45 20.5 12 20.5 12 20.5s7.55 0 9.38-.55a3.02 3.02 0 0 0 2.12-2.14C24 15.96 24 12 24 12s0-3.96-.5-5.81zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>
        YouTube
      </button>
      <button class="platform-btn" data-platform="tiktok">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.3 6.3 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34l-.04-8.74a8.2 8.2 0 0 0 4.81 1.55V4.67a4.85 4.85 0 0 1-1-.02z"/></svg>
        TikTok
      </button>
      <button class="platform-btn" data-platform="instagram">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
        Instagram
      </button>
      <button class="platform-btn" data-platform="twitter">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.737-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        X / Twitter
      </button>
    </div>

    <!-- URL input -->
    <div class="input-group">
      <input
        type="url"
        class="url-input"
        id="urlInput"
        placeholder="https://www.youtube.com/watch?v=..."
        autocomplete="off"
        spellcheck="false"
      />
      <button class="input-clear" id="clearBtn" aria-label="مسح">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Download button -->
    <button class="download-btn" id="downloadBtn" disabled>
      <div class="btn-spinner"></div>
      <span class="btn-text">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-left:6px">
          <path d="m12 15 3.5-3.5M12 15l-3.5-3.5M12 15V3"/><path d="M8 21h8M4 17h16"/>
        </svg>
        تحميل الفيديو
      </span>
    </button>

    <!-- Status messages -->
    <div class="status-box" id="statusBox">
      <span class="status-icon" id="statusIcon"></span>
      <span id="statusText"></span>
    </div>

    <!-- Result box -->
    <div class="result-box" id="resultBox">
      <div class="result-meta">
        <img class="result-thumb" id="resultThumb" src="" alt="" loading="lazy">
        <div class="result-info">
          <div class="result-title" id="resultTitle">جاهز للتحميل</div>
          <div class="result-platform" id="resultPlatform"></div>
        </div>
      </div>
      <div class="result-actions">
        <a class="action-btn primary" id="directDownloadBtn" href="#" target="_blank" rel="noopener noreferrer">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 15 3.5-3.5M12 15l-3.5-3.5M12 15V3"/><path d="M8 21h8M4 17h16"/></svg>
          تحميل مباشر
        </a>
        <button class="action-btn" id="copyLinkBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          نسخ الرابط
        </button>
      </div>
    </div>
  </div>

  <!-- Instances bar -->
  <div class="instances-bar" id="instancesBar">
    <div class="instances-header" id="instancesHeader">
      <div class="instances-title">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        حالة السيرفرات
        <span class="instances-count" id="aliveCount">...</span>
      </div>
      <svg class="instances-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="instances-list" id="instancesList"></div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    مدعوم بواسطة <a href="https://cobalt.tools" target="_blank" rel="noopener noreferrer">cobalt.tools</a> · مفتوح المصدر · لا يُخزَّن أي بيانات
  </footer>

  <script>
  (function () {
    'use strict';

    // ─── Cobalt instances list ───────────────────────────────────────────────
    // Public self-hosted cobalt instances (from cobalt.tools/instances)
    const INSTANCES = [
      'https://cobalt.api.timelessnesses.me',
      'https://cobalt.synklare.dev',
      'https://api.cobalt.tools',
      'https://cobalt-api.thetechrobo.ca',
      'https://cobalt.canine.tools',
      'https://capi.7ws.me',
      'https://co.wuk.sh',
    ];

    let activeInstance = null;
    let instanceResults = {}; // url -> { ok, ping }
    let currentDownloadUrl = null;
    let currentPlatform = 'auto';

    // ─── DOM refs ────────────────────────────────────────────────────────────
    const urlInput       = document.getElementById('urlInput');
    const clearBtn       = document.getElementById('clearBtn');
    const downloadBtn    = document.getElementById('downloadBtn');
    const statusBox      = document.getElementById('statusBox');
    const statusIcon     = document.getElementById('statusIcon');
    const statusText     = document.getElementById('statusText');
    const resultBox      = document.getElementById('resultBox');
    const resultThumb    = document.getElementById('resultThumb');
    const resultTitle    = document.getElementById('resultTitle');
    const resultPlatform = document.getElementById('resultPlatform');
    const directDlBtn    = document.getElementById('directDownloadBtn');
    const copyLinkBtn    = document.getElementById('copyLinkBtn');
    const instancesBar   = document.getElementById('instancesBar');
    const instancesHeader= document.getElementById('instancesHeader');
    const instancesList  = document.getElementById('instancesList');
    const aliveCount     = document.getElementById('aliveCount');

    // ─── Theme toggle ────────────────────────────────────────────────────────
    const root = document.documentElement;
    const themeBtn = document.querySelector('[data-theme-toggle]');
    let currentTheme = 'dark';
    root.setAttribute('data-theme', currentTheme);
    themeBtn.addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', currentTheme);
      themeBtn.innerHTML = currentTheme === 'dark'
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
    });

    // ─── Platform tabs ───────────────────────────────────────────────────────
    document.querySelectorAll('.platform-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPlatform = btn.dataset.platform;
        // update placeholder
        const placeholders = {
          auto: 'https://www.youtube.com/watch?v=...',
          youtube: 'https://www.youtube.com/shorts/...',
          tiktok: 'https://www.tiktok.com/@user/video/...',
          instagram: 'https://www.instagram.com/reel/...',
          twitter: 'https://twitter.com/user/status/...'
        };
        urlInput.placeholder = placeholders[currentPlatform] || placeholders.auto;
      });
    });

    // ─── Input events ────────────────────────────────────────────────────────
    urlInput.addEventListener('input', () => {
      const val = urlInput.value.trim();
      clearBtn.classList.toggle('visible', val.length > 0);
      downloadBtn.disabled = !isValidUrl(val) || !activeInstance;
      if (!val) hideAll();
    });

    clearBtn.addEventListener('click', () => {
      urlInput.value = '';
      clearBtn.classList.remove('visible');
      downloadBtn.disabled = true;
      hideAll();
      urlInput.focus();
    });

    function isValidUrl(s) {
      try { new URL(s); return true; } catch { return false; }
    }

    function hideAll() {
      statusBox.classList.remove('visible', 'success', 'error', 'info', 'warning');
      resultBox.classList.remove('visible');
    }

    // ─── Show status ─────────────────────────────────────────────────────────
    const ICONS = {
      success: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>`,
      error:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>`,
      info:    `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>`,
      warning: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m10.29 3.86-8.25 14.29A1 1 0 0 0 2.9 20h18.2a1 1 0 0 0 .86-1.52L13.71 3.86a1 1 0 0 0-1.72 0z"/><path d="M12 9v4M12 17h.01"/></svg>`,
    };

    function showStatus(type, msg) {
      hideAll();
      statusBox.classList.add('visible', type);
      statusIcon.innerHTML = ICONS[type] || '';
      statusText.textContent = msg;
    }

    // ─── Instance health check ───────────────────────────────────────────────
    function buildInstanceRows() {
      instancesList.innerHTML = '';
      INSTANCES.forEach(url => {
        const row = document.createElement('div');
        row.className = 'instance-row';
        row.dataset.url = url;
        row.innerHTML = `
          <span class="status-dot dot-checking"></span>
          <span class="instance-url">${url}</span>
          <span class="instance-ping">...</span>
        `;
        instancesList.appendChild(row);
      });
    }

    async function checkInstance(url) {
      const row = instancesList.querySelector(`[data-url="${url}"]`);
      const dot  = row?.querySelector('.status-dot');
      const ping = row?.querySelector('.instance-ping');
      const t0 = Date.now();
      try {
        const res = await fetch(`${url}/api/serverInfo`, {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
          signal: AbortSignal.timeout(5000),
        });
        const elapsed = Date.now() - t0;
        if (res.ok) {
          instanceResults[url] = { ok: true, ping: elapsed };
          if (dot) { dot.className = 'status-dot dot-ok'; }
          if (ping) ping.textContent = elapsed + 'ms';
          return elapsed;
        } else {
          throw new Error('not ok');
        }
      } catch {
        instanceResults[url] = { ok: false, ping: null };
        if (dot) { dot.className = 'status-dot dot-error'; }
        if (ping) ping.textContent = 'فشل';
        return null;
      }
    }

    async function findBestInstance() {
      buildInstanceRows();
      aliveCount.textContent = '...';

      // Check all in parallel
      const results = await Promise.allSettled(
        INSTANCES.map(url => checkInstance(url))
      );

      // Pick the fastest working one
      let best = null;
      let bestPing = Infinity;
      INSTANCES.forEach(url => {
        const r = instanceResults[url];
        if (r && r.ok && r.ping < bestPing) {
          bestPing = r.ping;
          best = url;
        }
      });

      const alive = INSTANCES.filter(u => instanceResults[u]?.ok).length;
      aliveCount.textContent = `${alive}/${INSTANCES.length}`;

      if (best) {
        activeInstance = best;
        // mark active
        instancesList.querySelectorAll('.instance-row').forEach(r => {
          r.classList.toggle('active-instance', r.dataset.url === best);
        });
        if (urlInput.value.trim() && isValidUrl(urlInput.value.trim())) {
          downloadBtn.disabled = false;
        }
      } else {
        showStatus('error', 'لا يوجد سيرفر متاح حالياً. يرجى المحاولة لاحقاً.');
      }
    }

    // ─── Instances bar toggle ────────────────────────────────────────────────
    instancesHeader.addEventListener('click', () => {
      instancesBar.classList.toggle('expanded');
    });

    // ─── Detect platform from URL ────────────────────────────────────────────
    function detectPlatform(url) {
      if (/youtube\.com|youtu\.be/.test(url)) return 'YouTube';
      if (/tiktok\.com/.test(url)) return 'TikTok';
      if (/instagram\.com/.test(url)) return 'Instagram';
      if (/twitter\.com|x\.com/.test(url)) return 'X / Twitter';
      if (/twitch\.tv/.test(url)) return 'Twitch';
      if (/soundcloud\.com/.test(url)) return 'SoundCloud';
      if (/vimeo\.com/.test(url)) return 'Vimeo';
      return 'فيديو';
    }

    // ─── Download logic ──────────────────────────────────────────────────────
    downloadBtn.addEventListener('click', async () => {
      const url = urlInput.value.trim();
      if (!url || !activeInstance) return;

      hideAll();
      resultBox.classList.remove('visible');
      downloadBtn.classList.add('loading');
      downloadBtn.disabled = true;
      showStatus('info', 'جارٍ معالجة الطلب...');

      try {
        const payload = { url };
        // Optional: add quality hints
        if (currentPlatform === 'youtube') {
          payload.videoQuality = '1080';
          payload.youtubeVideoCodec = 'vp9';
        }

        const response = await fetch(`${activeInstance}/api/json`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
          },
          body: JSON.stringify(payload),
          signal: AbortSignal.timeout(20000),
        });

        const data = await response.json();

        if (!response.ok || data.status === 'error') {
          const msg = data?.error?.code || data?.text || 'حدث خطأ غير متوقع';
          throw new Error(translateError(msg));
        }

        if (data.status === 'stream' || data.status === 'redirect' || data.url) {
          const dlUrl = data.url;
          currentDownloadUrl = dlUrl;

          // Populate result box
          const platform = detectPlatform(url);
          resultTitle.textContent = data.filename || 'فيديو جاهز للتحميل';
          resultPlatform.textContent = platform + ' · ' + activeInstance.replace('https://', '');

          // Attempt to get thumbnail for YouTube
          if (/youtube\.com|youtu\.be/.test(url)) {
            const match = url.match(/(?:v=|youtu\.be\/|shorts\/)([\w-]{11})/);
            if (match) {
              resultThumb.src = `https://img.youtube.com/vi/${match[1]}/mqdefault.jpg`;
              resultThumb.style.display = 'block';
            } else {
              resultThumb.style.display = 'none';
            }
          } else {
            resultThumb.style.display = 'none';
          }

          directDlBtn.href = dlUrl;
          resultBox.classList.add('visible');
          hideAll(); // remove the "processing" info

        } else if (data.status === 'picker') {
          // Multiple streams (e.g. audio + video)
          const dlUrl = data.picker?.[0]?.url || data.audio;
          if (dlUrl) {
            currentDownloadUrl = dlUrl;
            directDlBtn.href = dlUrl;
            resultTitle.textContent = 'اختر تنسيق التحميل';
            resultPlatform.textContent = detectPlatform(url);
            resultThumb.style.display = 'none';
            resultBox.classList.add('visible');
            hideAll();
          } else {
            throw new Error('لم يتم إيجاد رابط تحميل مناسب');
          }
        } else {
          throw new Error('استجابة غير متوقعة من السيرفر');
        }

      } catch (err) {
        let msg = err.message || 'حدث خطأ غير متوقع';
        // If the current instance failed, try to find another
        if (err.name === 'AbortError' || err.name === 'TypeError') {
          msg = 'انتهت مهلة الطلب. يجري البحث عن سيرفر بديل...';
          showStatus('warning', msg);
          // retry with next best
          const next = INSTANCES.find(u => u !== activeInstance && instanceResults[u]?.ok);
          if (next) {
            activeInstance = next;
            setTimeout(() => downloadBtn.click(), 800);
            downloadBtn.classList.remove('loading');
            downloadBtn.disabled = false;
            return;
          }
        }
        showStatus('error', msg);
      } finally {
        downloadBtn.classList.remove('loading');
        if (urlInput.value.trim() && isValidUrl(urlInput.value.trim())) {
          downloadBtn.disabled = !activeInstance;
        }
      }
    });

    // ─── Copy link ───────────────────────────────────────────────────────────
    copyLinkBtn.addEventListener('click', async () => {
      if (!currentDownloadUrl) return;
      try {
        await navigator.clipboard.writeText(currentDownloadUrl);
        copyLinkBtn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 12 2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg>
          تم النسخ!
        `;
        setTimeout(() => {
          copyLinkBtn.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            نسخ الرابط
          `;
        }, 2000);
      } catch {
        showStatus('info', 'انسخ الرابط يدوياً: ' + currentDownloadUrl);
      }
    });

    // ─── Error translation ───────────────────────────────────────────────────
    function translateError(code) {
      const map = {
        'error.api.link.invalid': 'الرابط غير صالح أو غير مدعوم',
        'error.api.link.unsupported': 'هذا النوع من الروابط غير مدعوم',
        'error.api.fetch.short_link': 'تعذّر تحليل الرابط المختصر',
        'error.api.youtube.login': 'يتطلب YouTube تسجيل الدخول لهذا الفيديو',
        'error.api.youtube.age': 'الفيديو مقيّد بالعمر',
        'error.api.youtube.private': 'الفيديو خاص',
        'error.api.content.too_long': 'الفيديو طويل جداً للتحميل',
        'error.api.rate_exceeded': 'تجاوزت الحد المسموح. حاول بعد قليل.',
        'error.api.content.unavailable': 'المحتوى غير متاح',
        'error.api.service.unsupported': 'المنصة غير مدعومة',
      };
      return map[code] || code;
    }

    // ─── Init ────────────────────────────────────────────────────────────────
    findBestInstance();
  })();
  </script>
</body>
</html>
