<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محمّل الفيديوهات</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0e17;
      --surface: #1a1828;
      --surface2: #221f35;
      --border: rgba(255,255,255,0.08);
      --text: #fffffe;
      --muted: rgba(255,255,255,0.5);
      --accent: #7c6fcd;
      --accent2: #5a4fcf;
      --green: #00c853;
      --green2: #00796b;
      --error: #ff6b6b;
      --warn: #ffd700;
      --radius: 16px;
      --radius-sm: 10px;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: 20px;
      gap: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px;
      width: 100%;
      max-width: 560px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }
    .logo { font-size: 52px; margin-bottom: 10px; line-height: 1; }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .platforms {
      display: flex; gap: 8px; justify-content: center;
      margin-bottom: 28px; flex-wrap: wrap;
    }
    .badge {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: var(--muted);
    }
    .input-wrap { position: relative; margin-bottom: 10px; }
    input {
      width: 100%;
      padding: 15px 48px 15px 18px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .25s;
      text-align: right;
      direction: ltr;
    }
    input::placeholder { color: var(--muted); direction: rtl; text-align: right; }
    input:focus { border-color: var(--accent); }
    .clear-btn {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); font-size: 18px;
      cursor: pointer; padding: 4px;
      display: none;
    }
    .clear-btn.show { display: block; }
    .main-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .2s;
      margin-bottom: 0;
    }
    .main-btn:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .main-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* status */
    .status {
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      display: none;
      text-align: center;
      line-height: 1.5;
    }
    .status.loading { background: rgba(255,215,0,.08); border: 1px solid rgba(255,215,0,.2); color: var(--warn); }
    .status.success { background: rgba(0,200,83,.08); border: 1px solid rgba(0,200,83,.2); color: #00e676; }
    .status.error   { background: rgba(255,80,80,.08); border: 1px solid rgba(255,80,80,.2); color: var(--error); }

    /* download area */
    .dl-section { display: none; margin-top: 12px; }
    .dl-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 700;
      cursor: pointer; text-decoration: none;
      transition: opacity .2s, transform .2s;
    }
    .dl-btn:hover { opacity: .9; transform: translateY(-1px); }
    .picker-list { display: flex; flex-direction: column; gap: 8px; }
    .picker-item {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 16px;
      background: rgba(0,200,83,.1);
      border: 1px solid rgba(0,200,83,.25);
      border-radius: var(--radius-sm);
      color: #00e676; font-size: 13px; font-weight: 600;
      text-decoration: none;
      transition: background .2s, transform .2s;
    }
    .picker-item:hover { background: rgba(0,200,83,.18); transform: translateY(-1px); }

    /* spinner */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,215,0,.25);
      border-top-color: var(--warn);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* instance indicator */
    .inst-bar {
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted);
      min-height: 16px;
    }
    .inst-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      margin-left: 5px;
      vertical-align: middle;
    }
    .inst-dot.ok  { background: #00e676; }
    .inst-dot.bad { background: var(--error); }
    .inst-dot.try { background: var(--warn); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .footer { color: rgba(255,255,255,.2); font-size: 11px; }

    @media(max-width:480px){
      .card { padding: 32px 20px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="logo">🎬</div>
    <h1>محمّل الفيديوهات</h1>
    <p class="subtitle">حمّل أي فيديو قصير بضغطة واحدة</p>

    <div class="platforms">
      <span class="badge">TikTok 🎵</span>
      <span class="badge">Instagram Reels 📸</span>
      <span class="badge">YouTube Shorts ▶</span>
      <span class="badge">Twitter/X 🐦</span>
    </div>

    <div class="input-wrap">
      <input type="url" id="videoUrl"
        placeholder="الصق رابط الفيديو هنا..."
        autocomplete="off" spellcheck="false" />
      <button class="clear-btn" id="clearBtn" title="مسح">✕</button>
    </div>

    <button class="main-btn" id="dlBtn">⬇ تحميل الفيديو</button>

    <div class="status" id="status"></div>
    <div class="dl-section" id="dlSection"></div>
    <div class="inst-bar" id="instBar"></div>
  </div>

  <div class="footer">يدعم YouTube · Instagram · TikTok · Twitter/X</div>

<script>
(function(){

  // ── Cobalt public instances (client-side, browser IPs not blocked) ──
  const INSTANCES = [
    'https://cobalt.api.hussien.dev',
    'https://cobalt.catvibers.me',
    'https://cbl.risewill.org',
    'https://cobalt.foss.wtf',
    'https://cobalt.privacyredirect.com',
    'https://cobalt.perish.co',
    'https://api.cobalt.tools',
    'https://cobalt.lem.sh',
    'https://cobalt.api.timelessnesses.me',
  ];

  const AUTH_ERRORS = new Set([
    'error.api.auth.jwt.missing',
    'error.api.auth.jwt.invalid',
    'error.api.auth.key.missing',
    'error.api.auth.key.invalid',
  ]);

  const MSG = {
    'error.api.link.invalid':              'الرابط غير صالح أو غير مدعوم',
    'error.api.fetch.fail':                'تعذّر جلب الفيديو — قد يكون خاصاً أو محذوفاً',
    'error.api.youtube.login':             'هذا الفيديو يتطلب تسجيل الدخول على YouTube',
    'error.api.content.too_long':          'الفيديو طويل جداً',
    'error.api.content.video.unavailable': 'الفيديو غير متاح',
  };

  // ── DOM ──
  const urlInput  = document.getElementById('videoUrl');
  const clearBtn  = document.getElementById('clearBtn');
  const dlBtn     = document.getElementById('dlBtn');
  const statusEl  = document.getElementById('status');
  const dlSection = document.getElementById('dlSection');
  const instBar   = document.getElementById('instBar');

  // clear button visibility
  urlInput.addEventListener('input', () => {
    clearBtn.classList.toggle('show', urlInput.value.length > 0);
  });
  clearBtn.addEventListener('click', () => {
    urlInput.value = '';
    clearBtn.classList.remove('show');
    urlInput.focus();
    hideResult();
  });
  urlInput.addEventListener('keydown', e => { if(e.key==='Enter') run(); });
  dlBtn.addEventListener('click', run);

  function showStatus(type, html){
    statusEl.className = 'status ' + type;
    statusEl.innerHTML = html;
    statusEl.style.display = 'block';
  }
  function hideResult(){
    statusEl.style.display = 'none';
    dlSection.style.display = 'none';
    dlSection.innerHTML = '';
    instBar.innerHTML = '';
  }
  function setInstBar(host, state, tried, total){
    const dot = `<span class="inst-dot ${state}"></span>`;
    instBar.innerHTML = `${dot} جارٍ التجربة على: <b>${host}</b> &nbsp;(${tried}/${total})`;
  }
  function clearInstBar(){
    instBar.innerHTML = '';
  }

  async function tryInstance(instance, body){
    const res = await fetch(instance, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(14000),
    });
    const data = await res.json();
    return data;
  }

  async function run(){
    const url = urlInput.value.trim();
    if(!url){ showStatus('error', '⚠️ أدخل رابط الفيديو أولاً'); return; }

    dlBtn.disabled = true;
    hideResult();
    showStatus('loading', '<span class="spinner"></span>&nbsp; جارٍ البحث عن أفضل خادم...');

    const body = {
      url,
      videoQuality: '1080',
      filenameStyle: 'classic',
      downloadMode: 'auto',
      disableMetadata: true,
    };

    let lastErr = null;

    for(let i=0; i<INSTANCES.length; i++){
      const inst = INSTANCES[i];
      const host = inst.replace('https://','');
      setInstBar(host, 'try', i+1, INSTANCES.length);

      try {
        const data = await tryInstance(inst, body);

        if(data.status === 'error'){
          const code = data.error?.code || String(data.error || '');
          if(AUTH_ERRORS.has(code)){
            setInstBar(host, 'bad', i+1, INSTANCES.length);
            lastErr = data;
            continue; // try next
          }
          // real content error — show and stop
          clearInstBar();
          showStatus('error', '❌ ' + (MSG[code] || ('خطأ: ' + code)));
          dlBtn.disabled = false;
          return;
        }

        // success
        setInstBar(host, 'ok', i+1, INSTANCES.length);
        handleSuccess(data);
        dlBtn.disabled = false;
        return;

      } catch(e){
        // network / timeout — try next
        setInstBar(host, 'bad', i+1, INSTANCES.length);
        lastErr = { status:'error', error:{ code:'error.api.fetch.fail', message: e.message }};
        continue;
      }
    }

    // all failed
    clearInstBar();
    const code = lastErr?.error?.code || 'error.api.fetch.fail';
    showStatus('error', '❌ جميع الخوادم غير متاحة حالياً، حاول لاحقاً');
    dlBtn.disabled = false;
  }

  function handleSuccess(data){
    showStatus('success', '✅ تم! اضغط الزر أدناه لتنزيل الفيديو');

    if(data.status === 'picker'){
      const items = data.picker || [];
      if(!items.length){ showStatus('error','❌ لم يُعثر على روابط'); return; }
      showStatus('success', `✅ تم العثور على ${items.length} نسخة — اختر:`);
      dlSection.innerHTML = '<div class="picker-list">' +
        items.map((it,i)=>
          `<a class="picker-item" href="${it.url}" download="${it.filename||'video.mp4'}" target="_blank" rel="noopener">💾 نسخة ${i+1}${it.type?' · '+it.type:''}</a>`
        ).join('') + '</div>';
      dlSection.style.display = 'block';
      return;
    }

    // stream / redirect / tunnel
    if(data.url){
      dlSection.innerHTML =
        `<a class="dl-btn" href="${data.url}" download="${data.filename||'video.mp4'}" target="_blank" rel="noopener">💾 تنزيل الفيديو</a>`;
      dlSection.style.display = 'block';
      return;
    }

    showStatus('error','❌ استجابة غير متوقعة: ' + data.status);
  }

})();
</script>
</body>
</html>
